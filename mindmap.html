<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マインドマップ</title>
<style>
/* ── CSS variables for theming ── */
:root {
  --tb-bg:        #ffffff;
  --tb-border:    #e2e8f0;
  --tb-shadow:    0 2px 12px rgba(0,0,0,0.08);
  --title-color:  #1e293b;
  --sep-color:    #e2e8f0;
  --btn-slate-bg: #f1f5f9;
  --btn-slate-fg: #475569;
  --hint-bg:      rgba(0,0,0,0.06);
  --hint-fg:      #64748b;
  --hint-border:  rgba(0,0,0,0.07);
}
body.dark {
  --tb-bg:        #1a1d2e;
  --tb-border:    #2d3154;
  --tb-shadow:    0 2px 12px rgba(0,0,0,0.4);
  --title-color:  #e2e8f0;
  --sep-color:    #2d3154;
  --btn-slate-bg: #334155;
  --btn-slate-fg: #cbd5e1;
  --hint-bg:      rgba(0,0,0,0.52);
  --hint-fg:      #94a3b8;
  --hint-border:  rgba(255,255,255,0.06);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── toolbar ── */
#toolbar {
  background: var(--tb-bg);
  padding: 8px 14px;
  display: flex;
  gap: 6px;
  align-items: center;
  border-bottom: 1px solid var(--tb-border);
  flex-shrink: 0;
  box-shadow: var(--tb-shadow);
  transition: background 0.25s, border-color 0.25s;
  position: relative;
  z-index: 30;
}

.app-title {
  color: var(--title-color);
  font-size: 15px;
  font-weight: 700;
  margin-right: 4px;
  letter-spacing: 0.4px;
  transition: color 0.25s;
}

.sep    { width: 1px; height: 22px; background: var(--sep-color); margin: 0 2px; transition: background 0.25s; }
.spacer { flex: 1; }

/* ── buttons ── */
.btn {
  padding: 6px 11px;
  border: none;
  border-radius: 7px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: filter 0.15s, transform 0.1s, background 0.25s, color 0.25s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 4px;
  line-height: 1;
}
.btn:hover:not(:disabled) { filter: brightness(1.15); transform: translateY(-1px); }
.btn:active:not(:disabled){ transform: translateY(0); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }

.btn-blue  { background: #3b82f6; color: #fff; }
.btn-slate { background: var(--btn-slate-bg); color: var(--btn-slate-fg); }
.btn-red   { background: #ef4444; color: #fff; }
.btn-green { background: #10b981; color: #fff; }

/* ── zoom controls ── */
.zoom-group {
  display: flex;
  align-items: center;
  background: var(--btn-slate-bg);
  border-radius: 8px;
  padding: 2px;
  gap: 1px;
  transition: background 0.25s;
}
.btn-icon {
  padding: 5px 8px;
  font-size: 15px;
  font-weight: 400;
  min-width: 28px;
  justify-content: center;
  border-radius: 6px;
  background: transparent;
  color: var(--btn-slate-fg);
}
.btn-icon:hover:not(:disabled) { background: var(--btn-slate-bg); filter: brightness(0.92); transform: none; }
.zoom-pct {
  padding: 5px 6px;
  font-size: 11.5px;
  font-weight: 600;
  min-width: 44px;
  justify-content: center;
  border-radius: 6px;
  background: transparent;
  color: var(--btn-slate-fg);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.3px;
}
.zoom-pct:hover:not(:disabled) { background: rgba(0,0,0,0.06); filter: none; transform: none; }

/* ── canvas area ── */
#canvas-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#canvas { display: block; cursor: default; }
#canvas.panning  { cursor: grabbing; }
#canvas.dragging { cursor: grabbing; }

/* ── text edit overlay ── */
#edit-overlay { display: none; position: absolute; z-index: 20; }
#edit-input {
  border: 2.5px solid #3b82f6;
  border-radius: 8px;
  outline: none;
  font-weight: 600;
  padding: 0 12px;
  background: #fff;
  color: #111;
  width: 100%;
  text-align: center;
  box-shadow: 0 6px 24px rgba(0,0,0,0.22);
}

/* ── color picker popup ── */
#color-popup {
  display: none;
  position: fixed;
  z-index: 100;
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  width: 196px;
}
#color-popup::before {
  content: '';
  position: absolute;
  top: -6px; left: 20px;
  width: 12px; height: 12px;
  background: #fff;
  border-left: 1px solid #e2e8f0;
  border-top: 1px solid #e2e8f0;
  transform: rotate(45deg);
}
.popup-label {
  font-size: 11px; font-weight: 600;
  color: #94a3b8; letter-spacing: 0.5px;
  text-transform: uppercase; margin-bottom: 8px;
}
#color-swatches {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 5px; margin-bottom: 10px;
}
.swatch {
  width: 26px; height: 26px;
  border-radius: 50%; cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.12s, border-color 0.12s;
}
.swatch:hover { transform: scale(1.2); }
.swatch.active { border-color: #1e293b; box-shadow: 0 0 0 2px #fff, 0 0 0 4px #1e293b; }
.popup-divider { height: 1px; background: #f1f5f9; margin: 8px 0; }
.custom-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: #475569; font-weight: 500;
}
#color-custom {
  width: 28px; height: 28px;
  border: none; border-radius: 6px;
  cursor: pointer; padding: 0; background: none; overflow: hidden;
}

/* ── hint bar ── */
#hint {
  position: absolute;
  bottom: 14px; left: 50%;
  transform: translateX(-50%);
  background: var(--hint-bg);
  color: var(--hint-fg);
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 11px;
  pointer-events: none;
  white-space: nowrap;
  border: 1px solid var(--hint-border);
  transition: background 0.25s, color 0.25s, border-color 0.25s;
}
</style>
</head>
<body>

<div id="toolbar">
  <span class="app-title">🧠 マインドマップ</span>
  <div class="sep"></div>
  <button class="btn btn-blue"  id="btn-add"    disabled>＋ 子ノード追加</button>
  <button class="btn btn-slate" id="btn-edit"   disabled>✏ 名前を変更</button>
  <button class="btn btn-slate" id="btn-color"  disabled>🎨 カラー</button>
  <button class="btn btn-red"   id="btn-delete" disabled>🗑 削除</button>
  <div class="sep"></div>
  <button class="btn btn-slate" id="btn-reset">↺ リセット</button>
  <div class="spacer"></div>
  <!-- zoom controls -->
  <div class="zoom-group">
    <button class="btn btn-icon" id="btn-zoom-out" title="縮小">－</button>
    <button class="btn zoom-pct" id="btn-zoom-reset" title="ズームをリセット (クリック)">100%</button>
    <button class="btn btn-icon" id="btn-zoom-in"  title="拡大">＋</button>
  </div>
  <div class="sep"></div>
  <button class="btn btn-slate" id="btn-theme">🌙 ダークモード</button>
  <button class="btn btn-green" id="btn-export">💾 画像を保存</button>
</div>

<div id="color-popup">
  <div class="popup-label">ノードカラー</div>
  <div id="color-swatches"></div>
  <div class="popup-divider"></div>
  <div class="custom-row">
    <span>カスタム</span>
    <input type="color" id="color-custom" value="#3b82f6" title="カスタムカラー" />
  </div>
</div>

<div id="canvas-container">
  <canvas id="canvas"></canvas>
  <div id="edit-overlay">
    <input id="edit-input" type="text" placeholder="テキストを入力…" />
  </div>
  <div id="hint">
    ダブルクリック: 編集 &nbsp;·&nbsp; Tab: 子ノード追加 &nbsp;·&nbsp;
    Delete: 削除 &nbsp;·&nbsp; ドラッグ: 移動 &nbsp;·&nbsp;
    空白ドラッグ: パン &nbsp;·&nbsp; スクロール: ズーム
  </div>
</div>

<script>
(function () {
  /* ════ DOM refs ════ */
  const canvas      = document.getElementById('canvas');
  const ctx         = canvas.getContext('2d');
  const container   = document.getElementById('canvas-container');
  const overlay     = document.getElementById('edit-overlay');
  const input       = document.getElementById('edit-input');
  const colorPopup  = document.getElementById('color-popup');
  const colorCustom = document.getElementById('color-custom');
  const zoomResetBtn = document.getElementById('btn-zoom-reset');

  /* ════ Theme ════ */
  let darkMode = false;

  const THEME = {
    light: { canvasBg: '#f5f7fb', dotColor: 'rgba(0,0,0,0.055)', shadowColor: 'rgba(0,0,0,0.15)', selRing: 'rgba(0,0,0,0.75)' },
    dark:  { canvasBg: '#0f1117', dotColor: 'rgba(255,255,255,0.04)', shadowColor: 'rgba(0,0,0,0.45)', selRing: 'rgba(255,255,255,0.9)' }
  };
  const theme = () => darkMode ? THEME.dark : THEME.light;

  function applyTheme() {
    document.body.classList.toggle('dark', darkMode);
    document.getElementById('btn-theme').textContent = darkMode ? '☀️ ライトモード' : '🌙 ダークモード';
    render();
  }

  /* ════ Palette ════ */
  const BRANCH_COLORS = ['#f97316','#10b981','#8b5cf6','#ef4444','#06b6d4','#f59e0b','#ec4899','#84cc16'];
  const SWATCHES      = ['#ef4444','#f97316','#f59e0b','#84cc16','#22c55e','#10b981','#06b6d4','#3b82f6','#6366f1','#8b5cf6','#ec4899','#64748b'];

  const swatchContainer = document.getElementById('color-swatches');
  SWATCHES.forEach(hex => {
    const d = document.createElement('div');
    d.className = 'swatch'; d.style.background = hex; d.dataset.color = hex; d.title = hex;
    d.addEventListener('click', () => { changeNodeColor(hex); closeColorPopup(); });
    swatchContainer.appendChild(d);
  });

  function updateSwatchActive(color) {
    document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', s.dataset.color === color));
    colorCustom.value = /^#[0-9a-f]{6}$/i.test(color) ? color : '#3b82f6';
  }

  /* ════ State ════ */
  let nodes    = [];
  let selId    = null;
  let dragNode = null;
  let dragOff  = {x:0, y:0};
  let editId   = null;
  let counter  = 0;

  /* ════ Zoom / pan state ════ */
  let zoom    = 1;
  let panX    = 0;
  let panY    = 0;
  let panning = false;
  let panStart = {x:0, y:0};

  /* coordinate helpers */
  const s2c = (sx, sy) => ({ x: (sx - panX) / zoom, y: (sy - panY) / zoom });
  const c2s = (cx, cy) => ({ x: cx * zoom + panX,   y: cy * zoom + panY   });

  function setZoom(newZoom, cx, cy) {
    /* cx, cy: screen-space pivot point (default: canvas centre) */
    if (cx == null) { cx = canvas.width / 2; cy = canvas.height / 2; }
    newZoom = Math.max(0.1, Math.min(5, newZoom));
    const f = newZoom / zoom;
    panX = cx - (cx - panX) * f;
    panY = cy - (cy - panY) * f;
    zoom = newZoom;
    zoomResetBtn.textContent = Math.round(zoom * 100) + '%';
    render();
  }

  function resetZoom() { zoom = 1; panX = 0; panY = 0; zoomResetBtn.textContent = '100%'; render(); }

  /* ════ Node helpers ════ */
  function uid() { return ++counter; }

  function makeNode(x, y, text, parentId) {
    const parent = parentId != null ? nodes.find(n => n.id === parentId) : null;
    const isRoot = parentId == null;
    let branchColor;
    if (isRoot) {
      branchColor = '#3b82f6';
    } else if (parent && parent.isRoot) {
      branchColor = BRANCH_COLORS[nodes.filter(n => n.parentId === parentId).length % BRANCH_COLORS.length];
    } else {
      branchColor = parent ? parent.branchColor : '#3b82f6';
    }
    return { id: uid(), x, y, text, parentId, isRoot, branchColor };
  }

  /* nodeSize returns dimensions in *canvas* (logical) space */
  function nodeSize(node) {
    ctx.font = `${node.isRoot ? 'bold ' : ''}${node.isRoot ? 15 : 13}px "Helvetica Neue",Arial,sans-serif`;
    const tw = ctx.measureText(node.text).width;
    const px = node.isRoot ? 26 : 20;
    return { w: Math.max(tw + px * 2, node.isRoot ? 130 : 90), h: node.isRoot ? 48 : 36 };
  }

  /* hit test in canvas space */
  function hit(node, cx, cy) {
    const {w, h} = nodeSize(node);
    return cx >= node.x - w/2 && cx <= node.x + w/2 && cy >= node.y - h/2 && cy <= node.y + h/2;
  }

  function nodeAt(cx, cy) {
    for (let i = nodes.length - 1; i >= 0; i--)
      if (hit(nodes[i], cx, cy)) return nodes[i];
    return null;
  }

  /* ════ Drawing ════ */
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y,   x+w, y+r,   r);
    ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
    ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
    ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
    ctx.closePath();
  }

  function drawConnection(from, to) {
    const dx = to.x - from.x;
    ctx.save();
    ctx.strokeStyle = to.branchColor + 'aa';
    ctx.lineWidth   = 2.5;
    ctx.lineCap     = 'round';
    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    ctx.bezierCurveTo(from.x + dx*0.5, from.y, to.x - dx*0.5, to.y, to.x, to.y);
    ctx.stroke();
    ctx.restore();
  }

  function drawNode(node) {
    const {w, h}    = nodeSize(node);
    const x          = node.x - w/2;
    const y          = node.y - h/2;
    const r          = node.isRoot ? 13 : 9;
    const isSelected = node.id === selId;
    const color      = node.branchColor;
    const t          = theme();

    ctx.save();
    ctx.shadowColor   = isSelected ? color + 'bb' : t.shadowColor;
    ctx.shadowBlur    = isSelected ? 22 : 10;
    ctx.shadowOffsetY = 3;

    roundRect(x, y, w, h, r);
    ctx.fillStyle = color;
    ctx.fill();

    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

    if (isSelected) {
      roundRect(x-3, y-3, w+6, h+6, r+3);
      ctx.strokeStyle = t.selRing;
      ctx.lineWidth   = 2.5;
      ctx.stroke();
    }

    const grad = ctx.createLinearGradient(x, y, x, y+h);
    grad.addColorStop(0, 'rgba(255,255,255,0.22)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    roundRect(x, y, w, h, r);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.fillStyle    = 'rgba(255,255,255,0.95)';
    ctx.font         = `${node.isRoot ? 'bold ' : ''}${node.isRoot ? 15 : 13}px "Helvetica Neue",Arial,sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(node.text, node.x, node.y);
    ctx.restore();
  }

  function render() {
    const t = theme();
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    /* background */
    ctx.fillStyle = t.canvasBg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    /* dot grid – drawn in screen space so dots stay 1 px regardless of zoom */
    const step = 36 * zoom;
    const ox = ((panX % step) + step) % step;
    const oy = ((panY % step) + step) % step;
    ctx.fillStyle = t.dotColor;
    for (let gx = ox; gx < canvas.width;  gx += step)
    for (let gy = oy; gy < canvas.height; gy += step) {
      ctx.beginPath(); ctx.arc(gx, gy, 1, 0, Math.PI*2); ctx.fill();
    }

    /* apply zoom + pan transform for all nodes/connections */
    ctx.save();
    ctx.translate(panX, panY);
    ctx.scale(zoom, zoom);

    for (const node of nodes) {
      if (node.parentId != null) {
        const par = nodes.find(n => n.id === node.parentId);
        if (par) drawConnection(par, node);
      }
    }
    for (const node of nodes) drawNode(node);

    ctx.restore();
  }

  /* ════ Selection ════ */
  function updateButtons() {
    const s = nodes.find(n => n.id === selId);
    document.getElementById('btn-add').disabled    = !s;
    document.getElementById('btn-edit').disabled   = !s;
    document.getElementById('btn-color').disabled  = !s;
    document.getElementById('btn-delete').disabled = !s || s.isRoot;
  }

  function select(id) {
    selId = id;
    updateButtons();
    if (id == null) closeColorPopup();
    render();
  }

  /* ════ Color picker ════ */
  let colorPopupOpen = false;

  function openColorPopup() {
    const btn  = document.getElementById('btn-color');
    const rect = btn.getBoundingClientRect();
    colorPopup.style.left    = rect.left + 'px';
    colorPopup.style.top     = (rect.bottom + 8) + 'px';
    colorPopup.style.display = 'block';
    colorPopupOpen = true;
    const node = nodes.find(n => n.id === selId);
    if (node) updateSwatchActive(node.branchColor);
  }

  function closeColorPopup() { colorPopup.style.display = 'none'; colorPopupOpen = false; }
  function toggleColorPopup() { colorPopupOpen ? closeColorPopup() : openColorPopup(); }

  function changeNodeColor(color) {
    const node = nodes.find(n => n.id === selId);
    if (!node) return;
    const old = node.branchColor;
    (function propagate(id) {
      const n = nodes.find(x => x.id === id);
      if (!n) return;
      if (n.branchColor === old) n.branchColor = color;
      nodes.filter(x => x.parentId === id).forEach(c => propagate(c.id));
    })(node.id);
    updateSwatchActive(color);
    render();
  }

  /* ════ Child placement ════ */
  function childPos(parent) {
    const count = nodes.filter(n => n.parentId === parent.id).length;
    if (parent.isRoot) {
      const angles = [0, Math.PI, -Math.PI/2, Math.PI/2, Math.PI/4, -Math.PI/4, 3*Math.PI/4, -3*Math.PI/4];
      const a = angles[count % angles.length];
      return { x: parent.x + Math.cos(a)*200, y: parent.y + Math.sin(a)*200 };
    }
    const gp = nodes.find(n => n.id === parent.parentId);
    const a  = gp ? Math.atan2(parent.y - gp.y, parent.x - gp.x) : 0;
    const pa = a + Math.PI/2;
    const sideAmt = count === 0 ? 0 : Math.ceil(count/2) * 52;
    const side    = count % 2 === 0 ? 1 : -1;
    return {
      x: parent.x + Math.cos(a)*155 + Math.cos(pa)*side*sideAmt,
      y: parent.y + Math.sin(a)*155 + Math.sin(pa)*side*sideAmt
    };
  }

  /* ════ Add / delete ════ */
  function addChild() {
    const par = nodes.find(n => n.id === selId);
    if (!par) return;
    closeColorPopup();
    const pos  = childPos(par);
    const node = makeNode(pos.x, pos.y, '新しいノード', par.id);
    nodes.push(node);
    selId = node.id;
    select(node.id);
    startEdit(node);
  }

  function deleteSelected() {
    const s = nodes.find(n => n.id === selId);
    if (!s || s.isRoot) return;
    const del = new Set();
    (function collect(id) {
      del.add(id);
      nodes.filter(n => n.parentId === id).forEach(c => collect(c.id));
    })(s.id);
    nodes = nodes.filter(n => !del.has(n.id));
    select(null);
  }

  /* ════ Text editing ════ */
  function startEdit(node) {
    if (!node) return;
    closeColorPopup();
    editId = node.id;
    const {w, h} = nodeSize(node);

    /* position overlay in *screen* space */
    const sc = c2s(node.x, node.y);
    const sw = w * zoom;
    const sh = h * zoom;
    overlay.style.display  = 'block';
    overlay.style.left     = (sc.x - sw/2) + 'px';
    overlay.style.top      = (sc.y - sh/2) + 'px';
    overlay.style.width    = sw + 'px';
    input.style.height     = sh + 'px';
    input.style.lineHeight = sh + 'px';
    input.style.fontSize   = Math.max(9, (node.isRoot ? 15 : 13) * zoom) + 'px';
    input.value = node.text;
    requestAnimationFrame(() => { input.focus(); input.select(); });
  }

  function finishEdit() {
    if (editId == null) return;
    const node = nodes.find(n => n.id === editId);
    if (node) { const v = input.value.trim(); if (v) node.text = v; }
    editId = null;
    overlay.style.display = 'none';
    render();
  }

  function cancelEdit() {
    editId = null;
    overlay.style.display = 'none';
    render();
  }

  /* ════ Init / resize ════ */
  function init() {
    nodes = []; selId = null; counter = 0;
    zoom = 1; panX = 0; panY = 0;
    zoomResetBtn.textContent = '100%';
    closeColorPopup();
    const root = makeNode(canvas.width/2, canvas.height/2, 'メインテーマ', null);
    root.isRoot = true;
    nodes.push(root);
    select(null);
    render();
  }

  function resize() {
    canvas.width  = container.clientWidth;
    canvas.height = container.clientHeight;
    render();
  }

  /* ════ Mouse ════ */
  canvas.addEventListener('mousedown', e => {
    if (editId != null) finishEdit();
    closeColorPopup();
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
    const {x, y} = s2c(sx, sy);        /* canvas-space coords */
    const node = nodeAt(x, y);

    if (node) {
      select(node.id);
      dragNode = node;
      dragOff  = { x: x - node.x, y: y - node.y };
      canvas.classList.add('dragging');
    } else {
      select(null);
      panning  = true;
      panStart = { x: sx - panX, y: sy - panY };
      canvas.classList.add('panning');
    }
  });

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left, sy = e.clientY - rect.top;

    if (dragNode) {
      const {x, y} = s2c(sx, sy);
      dragNode.x = x - dragOff.x;
      dragNode.y = y - dragOff.y;
      render();
    } else if (panning) {
      panX = sx - panStart.x;
      panY = sy - panStart.y;
      render();
    }
  });

  canvas.addEventListener('mouseup', () => {
    dragNode = null;
    panning  = false;
    canvas.classList.remove('dragging', 'panning');
  });

  canvas.addEventListener('mouseleave', () => {
    dragNode = null;
    panning  = false;
    canvas.classList.remove('dragging', 'panning');
  });

  canvas.addEventListener('dblclick', e => {
    const rect = canvas.getBoundingClientRect();
    const {x, y} = s2c(e.clientX - rect.left, e.clientY - rect.top);
    const node = nodeAt(x, y);
    if (node) { select(node.id); startEdit(node); }
  });

  /* scroll-wheel zoom centred on cursor */
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    setZoom(zoom * factor, cx, cy);
  }, { passive: false });

  /* close color popup when clicking outside */
  document.addEventListener('mousedown', e => {
    if (colorPopupOpen && !colorPopup.contains(e.target) && e.target.id !== 'btn-color')
      closeColorPopup();
  }, true);

  /* ════ Keyboard ════ */
  document.addEventListener('keydown', e => {
    if (editId != null) return;
    if (e.key === 'Tab')    { e.preventDefault(); addChild(); return; }
    if (e.key === 'Escape') { select(null); closeColorPopup(); return; }
    if (e.key === 'Delete' || e.key === 'Backspace') {
      const s = nodes.find(n => n.id === selId);
      if (s && !s.isRoot) deleteSelected();
    }
    if (e.key === 'Enter' || e.key === 'F2') {
      const s = nodes.find(n => n.id === selId);
      if (s) startEdit(s);
    }
    /* Ctrl/Cmd + = / - for zoom */
    if ((e.ctrlKey || e.metaKey) && (e.key === '+' || e.key === '=')) { e.preventDefault(); setZoom(zoom * 1.2); }
    if ((e.ctrlKey || e.metaKey) &&  e.key === '-')                    { e.preventDefault(); setZoom(zoom / 1.2); }
    if ((e.ctrlKey || e.metaKey) &&  e.key === '0')                    { e.preventDefault(); resetZoom(); }
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); finishEdit(); }
    if (e.key === 'Escape') cancelEdit();
    e.stopPropagation();
  });
  input.addEventListener('blur', () => setTimeout(finishEdit, 120));

  /* ════ Color input ════ */
  colorCustom.addEventListener('input',  () => changeNodeColor(colorCustom.value));
  colorCustom.addEventListener('change', () => closeColorPopup());

  /* ════ Toolbar buttons ════ */
  document.getElementById('btn-add').addEventListener('click', addChild);
  document.getElementById('btn-edit').addEventListener('click', () => {
    const s = nodes.find(n => n.id === selId); if (s) startEdit(s);
  });
  document.getElementById('btn-color').addEventListener('click', toggleColorPopup);
  document.getElementById('btn-delete').addEventListener('click', deleteSelected);
  document.getElementById('btn-reset').addEventListener('click', () => {
    if (confirm('マインドマップをリセットしますか？')) init();
  });
  document.getElementById('btn-theme').addEventListener('click', () => {
    darkMode = !darkMode; applyTheme();
  });
  document.getElementById('btn-zoom-in').addEventListener('click', () => setZoom(zoom * 1.2));
  document.getElementById('btn-zoom-out').addEventListener('click', () => setZoom(zoom / 1.2));
  document.getElementById('btn-zoom-reset').addEventListener('click', resetZoom);
  document.getElementById('btn-export').addEventListener('click', () => {
    closeColorPopup();
    select(null);
    requestAnimationFrame(() => {
      const link = document.createElement('a');
      link.download = 'mindmap_' + new Date().toISOString().slice(0,10) + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  });

  /* ════ Boot ════ */
  window.addEventListener('resize', resize);
  resize();
  init();
  applyTheme();
})();
</script>
</body>
</html>
